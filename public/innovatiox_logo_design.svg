<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>InnovatioX.com logo design</title>
<desc>Propuesta de logo para InnovatioX.com: logo horizontal principal con icono y wordmark, variante icon-only, versión stacked para redes, y tratamiento monocromo.</desc>

<defs>
<linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#38BDF8"/>
<stop offset="55%" stop-color="#8B5CF6"/>
<stop offset="100%" stop-color="#A855F7"/>
</linearGradient>
</defs>

<rect x="20" y="20" width="640" height="210" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

<g transform="translate(60, 65)">
<rect width="120" height="120" rx="26" fill="#0F172A"/>
<line x1="32" y1="32" x2="88" y2="88" stroke="url(#xGrad)" stroke-width="18" stroke-linecap="round"/>
<line x1="88" y1="32" x2="32" y2="88" stroke="url(#xGrad)" stroke-width="18" stroke-linecap="round"/>
</g>

<text x="212" y="132" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="500" fill="#0F172A" letter-spacing="-1.2">innovatio<tspan fill="url(#xGrad)" font-weight="600">X</tspan><tspan font-size="30" fill="#64748B" font-weight="400">.com</tspan></text>
<text x="214" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748B" letter-spacing="4">CLOUD · .NET · FULL STACK</text>

<rect x="20" y="250" width="200" height="220" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
<g transform="translate(60, 290)">
<rect width="120" height="120" rx="26" fill="#0F172A"/>
<line x1="32" y1="32" x2="88" y2="88" stroke="url(#xGrad)" stroke-width="18" stroke-linecap="round"/>
<line x1="88" y1="32" x2="32" y2="88" stroke="url(#xGrad)" stroke-width="18" stroke-linecap="round"/>
</g>
<text x="120" y="450" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#94A3B8" letter-spacing="2.5" text-anchor="middle">ICON · FAVICON</text>

<rect x="240" y="250" width="200" height="220" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
<g transform="translate(284, 280)">
<rect width="112" height="112" rx="24" fill="#0F172A"/>
<line x1="30" y1="30" x2="82" y2="82" stroke="url(#xGrad)" stroke-width="16" stroke-linecap="round"/>
<line x1="82" y1="30" x2="30" y2="82" stroke="url(#xGrad)" stroke-width="16" stroke-linecap="round"/>
</g>
<text x="340" y="425" font-family="system-ui, sans-serif" font-size="19" font-weight="500" fill="#0F172A" text-anchor="middle" letter-spacing="-0.4">innovatio<tspan fill="url(#xGrad)" font-weight="600">X</tspan><tspan font-size="14" fill="#64748B" font-weight="400">.com</tspan></text>
<text x="340" y="450" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#94A3B8" letter-spacing="2.5" text-anchor="middle">STACKED · SOCIAL</text>

<rect x="460" y="250" width="200" height="220" rx="14" fill="#0F172A"/>
<g transform="translate(500, 290)">
<line x1="32" y1="32" x2="88" y2="88" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>
<line x1="88" y1="32" x2="32" y2="88" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>
</g>
<text x="560" y="450" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#CBD5E1" letter-spacing="2.5" text-anchor="middle">MONO · PRINT</text>

<g transform="translate(20, 505)">
<circle cx="8" cy="8" r="8" fill="#0F172A"/>
<text x="22" y="12" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Slate #0F172A</text>
<circle cx="138" cy="8" r="8" fill="#38BDF8"/>
<text x="152" y="12" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Sky #38BDF8</text>
<circle cx="258" cy="8" r="8" fill="#8B5CF6"/>
<text x="272" y="12" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Violet #8B5CF6</text>
<circle cx="388" cy="8" r="8" fill="#A855F7"/>
<text x="402" y="12" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Purple #A855F7</text>
</g>
</svg>
